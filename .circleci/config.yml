version: 2.1

orbs:
  codecov: codecov/codecov@6.0.0

jobs:
  check:
    docker:
      - image: cimg/python:3.14.6
    steps:
      - checkout
      - restore_cache:
          keys:
            - v2-uv-{{ checksum "uv.lock" }}
      - run:
          name: Install pinned uv
          command: pip install --user uv==0.11.28
      - run:
          name: Install locked dependencies
          command: uv sync --frozen --all-groups
      - save_cache:
          key: v2-uv-{{ checksum "uv.lock" }}
          paths:
            - ~/.cache/pip
            - ~/.cache/uv
      - run:
          name: Run local quality gates
          command: make check
      - run:
          name: Verify package build and install
          command: make package-check
      - codecov/upload:
          files: coverage.xml

workflows:
  build-and-test:
    jobs:
      - check
